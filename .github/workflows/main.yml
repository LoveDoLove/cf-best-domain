name: Update Cloudflare DNS

on:
  schedule:
    - cron: "*/30 * * * *" # 每隔三十分钟运行一次
  workflow_dispatch: # 手动触发
  # push: # 允许提交触发

permissions:
  contents: write

jobs:
  update-dns:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x" # 你可以指定需要的 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Validate secrets
        env:
          WETEST_CF2DNS_KEY: ${{ secrets.WETEST_CF2DNS_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$WETEST_CF2DNS_KEY" ]; then
            echo "Missing secret: WETEST_CF2DNS_KEY"
            exit 1
          fi
          if [ -z "$CF_API_TOKEN" ]; then
            echo "Missing secret: CF_API_TOKEN"
            exit 1
          fi

      - name: Collect IP list
        env:
          WETEST_CF2DNS_KEY: ${{ secrets.WETEST_CF2DNS_KEY }}
        run: |
          python collect_ips.py

      - name: Verify IP list
        run: |
          if [ ! -s ip.txt ]; then
            echo "ip.txt is empty; aborting Cloudflare DNS update"
            exit 1
          fi

      - name: Run update script
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          python bestdomain.py
